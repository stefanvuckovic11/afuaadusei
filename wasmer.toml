[package]
name = "stefanvuckovic11/keyzgrants"
version = "0.1.13"
description = "Portfolio website with persistent admin edits"

[dependencies]
"wasmer/python" = "^3.12.6"

[fs]
"/public" = "public"
"/settings" = "settings"
"/src" = "src"
"/data" = "data"

[[command]]
name = "run"
module = "wasmer/python:python"
runner = "wasi"

[command.annotations.wasi]
main-args = ["/src/main.py"]
env = ["PYTHONUNBUFFERED:1", "PYTHONEXECUTABLE:/bin/python"]
